app = "litestream-soak"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile.worker"

[[metrics]]
  port = 9091
  path = "/metrics"

[[metrics]]
  port = 9090
  path = "/metrics"

[[services]]
  internal_port = 9091
  protocol = "tcp"

  [[services.ports]]
    port = 9091

[mounts]
  source = "soak_data"
  destination = "/data"
