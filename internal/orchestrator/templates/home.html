{{define "home"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Litestream Soak</title>
  <link rel="stylesheet" href="/assets/dashboard.css?v={{assetVersion}}">
  <script src="/assets/chart.umd.min.js?v={{assetVersion}}" defer></script>
  <script src="/assets/dashboard.js?v={{assetVersion}}" defer></script>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="topbar-brand">Litestream Soak</div>

          <span id="refresh-count">10s</span>

        <a class="topbar-link" href="/ui/help">Help</a>
        <a class="topbar-link" href="/api/workers">API</a>
        <a class="topbar-link" href="/api/deployments/latest">Deploy</a>

        <a class="topbar-link" href="/api/events">Events</a>

    </div>
    <nav class="section-nav" aria-label="Page sections">
      <a href="#overview">Overview</a>
      <a href="#fleet">Fleet</a>
      <a href="#failures">Failures</a>
      <a href="#rollout">Rollout</a>
      <a href="#comparison">Comparison</a>
      <a href="#diagnosis">Diagnosis</a>
      <a href="#guide">Guide</a>
    </nav>
    <div id="home-live-root">{{template "home_body" .}}</div>
  </div>
</body>
</html>
{{end}}
