app = "litestream-soak-ctl"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile.control"

[env]
  WORKER_APP_NAME = "litestream-soak"
  DB_PATH = "/data/soakctl.db"
  LISTEN_ADDR = ":8080"
  CONTROL_BASE_URL = "https://litestream-soak-ctl.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[metrics]]
  port = 8080
  path = "/metrics"

[mounts]
  source = "soakctl_data"
  destination = "/data"
