name: deploy-main

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "grafana/**"
      - "tmp/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      control_changed: ${{ steps.detect.outputs.control_changed }}
      worker_changed: ${{ steps.detect.outputs.worker_changed }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - id: detect
        shell: bash
        run: |
          set -euo pipefail

          control_changed=false
          worker_changed=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            control_changed=true
            worker_changed=true
          else
            while IFS= read -r file; do
              case "$file" in
                cmd/soakctl/*|internal/orchestrator/*|internal/model/*|internal/flyapi/*|fly.control.toml|Dockerfile.control|go.mod|go.sum)
                  control_changed=true
                  ;;
              esac

              case "$file" in
                cmd/soakworker/*|internal/worker/*|internal/replay/*|internal/workload/*|internal/reporting/*|internal/model/*|internal/flyapi/*|fly.toml|Dockerfile.worker|datasets/*|go.mod|go.sum)
                  worker_changed=true
                  ;;
              esac
            done < <(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")
          fi

          echo "control_changed=${control_changed}" >> "${GITHUB_OUTPUT}"
          echo "worker_changed=${worker_changed}" >> "${GITHUB_OUTPUT}"

  verify:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - run: go test ./...
      - run: go build ./cmd/soakctl ./cmd/soakworker

  deploy-control-plane:
    needs:
      - changes
      - verify
    if: needs.changes.outputs.control_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: superfly/flyctl-actions/setup-flyctl@master
        with:
          version: 0.4.59

      - env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only --config fly.control.toml --app litestream-soak-ctl

  build-worker-image:
    needs:
      - changes
      - verify
    if: needs.changes.outputs.worker_changed == 'true'
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.build.outputs.image_ref }}
      litestream_sha: ${{ steps.build.outputs.litestream_sha }}
    steps:
      - uses: actions/checkout@v5

      - uses: superfly/flyctl-actions/setup-flyctl@master
        with:
          version: 0.4.59

      - id: build
        shell: bash
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          SOAK_LITESTREAM_SHA: ${{ vars.SOAK_LITESTREAM_SHA }}
        run: |
          set -euo pipefail

          parse_flyctl_image_ref() {
            local log_file="$1"
            local image_label="$2"
            local image_ref

            image_ref="$(awk '$1 == "image:" && $2 ~ "^registry[.]fly[.]io/litestream-soak:" {print $2}' "${log_file}" | tail -n 1 || true)"
            if [ -z "${image_ref}" ]; then
              echo "failed to parse image ref from flyctl output" >&2
              echo "expected a line matching: image: registry.fly.io/litestream-soak:${image_label}" >&2
              echo "last 40 lines of flyctl output:" >&2
              tail -n 40 "${log_file}" >&2
              return 1
            fi
            if [[ "${image_ref}" != "registry.fly.io/litestream-soak:${image_label}"* ]]; then
              echo "parsed flyctl image ref ${image_ref} does not match expected label ${image_label}" >&2
              echo "last 40 lines of flyctl output:" >&2
              tail -n 40 "${log_file}" >&2
              return 1
            fi

            printf '%s\n' "${image_ref}"
          }

          short_sha="${GITHUB_SHA::12}"
          log_file="$(mktemp)"
          build_args=()
          litestream_ref="${SOAK_LITESTREAM_SHA:-main}"

          if [[ "${litestream_ref}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            litestream_sha="${litestream_ref}"
          else
            if [ "${litestream_ref}" = "main" ]; then
              litestream_ref="refs/heads/main"
            fi
            litestream_sha="$(git ls-remote https://github.com/benbjohnson/litestream.git "${litestream_ref}" | awk 'NR==1{print $1}')"
            if [ -z "${litestream_sha}" ]; then
              echo "failed to resolve Litestream ref ${litestream_ref}" >&2
              exit 1
            fi
          fi

          build_args+=(--build-arg "LITESTREAM_SHA=${litestream_sha}")
          image_label="sha-${short_sha}-ls-${litestream_sha::12}"

          flyctl deploy \
            --remote-only \
            --app litestream-soak \
            --config fly.toml \
            --image-label "${image_label}" \
            "${build_args[@]}" \
            --build-only \
            --push 2>&1 | tee "${log_file}"

          if ! image_ref="$(parse_flyctl_image_ref "${log_file}" "${image_label}")"; then
            exit 1
          fi

          echo "image_ref=${image_ref}" >> "${GITHUB_OUTPUT}"
          echo "litestream_sha=${litestream_sha}" >> "${GITHUB_OUTPUT}"

  notify-worker-fleet:
    needs:
      - changes
      - build-worker-image
      - deploy-control-plane
    if: needs.changes.outputs.worker_changed == 'true' && needs.build-worker-image.result == 'success' && (needs.deploy-control-plane.result == 'success' || needs.deploy-control-plane.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - shell: bash
        env:
          CONTROL_BASE_URL: ${{ vars.SOAK_CONTROL_BASE_URL }}
          SOAK_ADMIN_BEARER_TOKEN: ${{ secrets.SOAK_ADMIN_BEARER_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${CONTROL_BASE_URL}" ]; then
            export CONTROL_BASE_URL="https://litestream-soak-ctl.fly.dev"
          fi

          chmod +x scripts/notify-deployment-ready.sh
          ./scripts/notify-deployment-ready.sh "${GITHUB_SHA}" main github_actions_main "${{ needs.build-worker-image.outputs.image_ref }}" "${{ needs.build-worker-image.outputs.litestream_sha }}"
