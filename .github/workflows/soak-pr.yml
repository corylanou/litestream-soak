name: soak-pr

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Litestream PR number to soak
        required: true
        type: string
      repo_full_name:
        description: Upstream GitHub repo in owner/name form
        required: false
        type: string
        default: benbjohnson/litestream
      pr_sha:
        description: Optional explicit PR head SHA override
        required: false
        type: string
  repository_dispatch:
    types:
      - litestream_pr_soak_requested

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: soak-pr-${{ github.event.client_payload.pr_number || github.event.inputs.pr_number || github.run_id }}
  cancel-in-progress: true

jobs:
  resolve-request:
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      repo_full_name: ${{ steps.resolve.outputs.repo_full_name }}
      pr_sha: ${{ steps.resolve.outputs.pr_sha }}
      source_name: ${{ steps.resolve.outputs.source_name }}
      trigger: ${{ steps.resolve.outputs.trigger }}
    steps:
      - id: resolve
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOAK_PR_REPO_ALLOWLIST: ${{ vars.SOAK_PR_REPO_ALLOWLIST }}
          SOAK_PR_ACTOR_ALLOWLIST: ${{ vars.SOAK_PR_ACTOR_ALLOWLIST }}
          SOAK_PR_LABEL_NAME: ${{ vars.SOAK_PR_LABEL_NAME }}
          PR_NUMBER: ${{ github.event.client_payload.pr_number || github.event.inputs.pr_number }}
          REPO_FULL_NAME: ${{ github.event.client_payload.repo_full_name || github.event.inputs.repo_full_name || 'benbjohnson/litestream' }}
          PR_SHA: ${{ github.event.client_payload.pr_sha || github.event.inputs.pr_sha || '' }}
          DISPATCHER_LOGIN: ${{ github.actor }}
          REQUESTED_LABEL: ${{ github.event.client_payload.label || '' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          pr_number="${PR_NUMBER}"
          repo_full_name="${REPO_FULL_NAME}"
          pr_sha="${PR_SHA}"
          allowed_repos="${SOAK_PR_REPO_ALLOWLIST:-benbjohnson/litestream}"
          allowed_actors="${SOAK_PR_ACTOR_ALLOWLIST:-benbjohnson,corylanou}"
          actor_login="${DISPATCHER_LOGIN}"
          requested_label="${REQUESTED_LABEL}"
          expected_label="${SOAK_PR_LABEL_NAME:-soak:test}"

          if [[ ! "${pr_number}" =~ ^[0-9]+$ ]]; then
            echo "pr_number must be numeric" >&2
            exit 1
          fi
          if [[ ! "${repo_full_name}" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
            echo "repo_full_name must use owner/name format" >&2
            exit 1
          fi

          case ",${allowed_repos}," in
            *,"${repo_full_name}",*) ;;
            *)
              echo "repo ${repo_full_name} is not in SOAK_PR_REPO_ALLOWLIST (${allowed_repos})" >&2
              exit 1
              ;;
          esac

          if [ "${EVENT_NAME}" = "repository_dispatch" ]; then
            if [ -z "${actor_login}" ]; then
              echo "repository_dispatch requests must have an authenticated dispatcher" >&2
              exit 1
            fi
            if ! printf '%s\n' "${allowed_actors}" | tr ',' '\n' | grep -Fxq "${actor_login}"; then
              echo "actor ${actor_login} is not in SOAK_PR_ACTOR_ALLOWLIST (${allowed_actors})" >&2
              exit 1
            fi
            if [ -n "${requested_label}" ] && [ "${requested_label}" != "${expected_label}" ]; then
              echo "label ${requested_label} does not match SOAK_PR_LABEL_NAME (${expected_label})" >&2
              exit 1
            fi
          fi

          if [ -z "${pr_sha}" ]; then
            pr_sha="$(gh api "repos/${repo_full_name}/pulls/${pr_number}" --jq .head.sha)"
          fi
          if [[ ! "${pr_sha}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "pr_sha must be a 40-character hexadecimal commit SHA" >&2
            exit 1
          fi

          source_name="pr-${pr_number}"
          trigger="github_actions_pr_soak"
          if [ "${EVENT_NAME}" = "repository_dispatch" ]; then
            trigger="repository_dispatch_pr_soak"
          fi

          {
            echo "pr_number=${pr_number}"
            echo "repo_full_name=${repo_full_name}"
            echo "pr_sha=${pr_sha}"
            echo "source_name=${source_name}"
            echo "trigger=${trigger}"
          } >> "${GITHUB_OUTPUT}"

  build-worker-image:
    needs: resolve-request
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.build.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v5

      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1
        with:
          version: 0.4.59

      - id: build
        shell: bash
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          PR_NUMBER: ${{ needs.resolve-request.outputs.pr_number }}
          PR_SHA: ${{ needs.resolve-request.outputs.pr_sha }}
        run: |
          set -euo pipefail

          parse_flyctl_image_ref() {
            local log_file="$1"
            local image_label="$2"
            local image_ref

            image_ref="$(awk '$1 == "image:" && $2 ~ "^registry[.]fly[.]io/litestream-soak:" {print $2}' "${log_file}" | tail -n 1 || true)"
            if [ -z "${image_ref}" ]; then
              echo "failed to parse image ref from flyctl output" >&2
              echo "expected a line matching: image: registry.fly.io/litestream-soak:${image_label}" >&2
              echo "last 40 lines of flyctl output:" >&2
              tail -n 40 "${log_file}" >&2
              return 1
            fi
            if [[ "${image_ref}" != "registry.fly.io/litestream-soak:${image_label}"* ]]; then
              echo "parsed flyctl image ref ${image_ref} does not match expected label ${image_label}" >&2
              echo "last 40 lines of flyctl output:" >&2
              tail -n 40 "${log_file}" >&2
              return 1
            fi

            printf '%s\n' "${image_ref}"
          }

          short_sha="${GITHUB_SHA::12}"
          pr_number="${PR_NUMBER}"
          pr_sha="${PR_SHA}"
          image_label="sha-${short_sha}-pr-${pr_number}-ls-${pr_sha::12}"
          log_file="$(mktemp)"

          flyctl deploy \
            --remote-only \
            --app litestream-soak \
            --config fly.toml \
            --image-label "${image_label}" \
            --build-arg "LITESTREAM_SHA=${pr_sha}" \
            --build-only \
            --push 2>&1 | tee "${log_file}"

          if ! image_ref="$(parse_flyctl_image_ref "${log_file}" "${image_label}")"; then
            exit 1
          fi

          echo "image_ref=${image_ref}" >> "${GITHUB_OUTPUT}"

  notify-worker-fleet:
    needs:
      - resolve-request
      - build-worker-image
    if: needs.build-worker-image.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - shell: bash
        env:
          CONTROL_BASE_URL: ${{ vars.SOAK_CONTROL_BASE_URL }}
          SOAK_ADMIN_BEARER_TOKEN: ${{ secrets.SOAK_ADMIN_BEARER_TOKEN }}
          SOURCE_NAME: ${{ needs.resolve-request.outputs.source_name }}
          TRIGGER: ${{ needs.resolve-request.outputs.trigger }}
          IMAGE_REF: ${{ needs.build-worker-image.outputs.image_ref }}
          PR_SHA: ${{ needs.resolve-request.outputs.pr_sha }}
        run: |
          set -euo pipefail

          if [ -z "${CONTROL_BASE_URL}" ]; then
            export CONTROL_BASE_URL="https://litestream-soak-ctl.fly.dev"
          fi

          chmod +x scripts/notify-deployment-ready.sh
          ./scripts/notify-deployment-ready.sh \
            "${GITHUB_SHA}" \
            "${SOURCE_NAME}" \
            "${TRIGGER}" \
            "${IMAGE_REF}" \
            "${PR_SHA}"
