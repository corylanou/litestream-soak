services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/litestream-soak &&
      echo 'Bucket created successfully'
      "

  soakworker:
    build:
      context: .
      dockerfile: Dockerfile.worker
      args:
        # the "main" default reuses Docker's cached clone layer even after
        # upstream moves; run `make compose-build` to pin upstream HEAD
        LITESTREAM_SHA: ${LITESTREAM_SHA:-main}
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      WORKER_ID: docker-test
      GIT_SHA: main
      SOURCE: main
      PROFILE: low-volume
      INITIAL_SIZE: 1MB
      VERIFY_INTERVAL: 1m
      SNAPSHOT_INTERVAL: 2m
      REPLICA_TYPE: s3
      S3_BUCKET: litestream-soak
      S3_PATH: soak
      S3_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    ports:
      - "9091:9091"
    volumes:
      - worker_data:/data

volumes:
  minio_data:
  worker_data:
